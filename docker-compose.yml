version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: scat-gi-postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C.UTF-8"
      POSTGRES_HOST_AUTH_METHOD: "trust"
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements", "-c", "cron.database_name=scat-gi"]

  redis:
    image: redis:7
    container_name: scat-gi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: